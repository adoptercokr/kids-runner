<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kids Runner Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- UI Overlay -->
        <div id="ui-layer">
            <div id="start-screen" class="screen">
                <h1>🏃‍♂️ 픽셀 러너</h1>
                <p style="margin-bottom: 20px;">점프: Space / 화면 터치</p>
                <button id="start-btn">게임 시작하기</button>
            </div>

            <div id="game-over-screen" class="screen hidden">
                <h1>앗, 넘어졌어요! 😢</h1>
                <p>내 점수: <span id="final-score">0</span>점</p>
                <button id="restart-btn">다시 달리기</button>
            </div>
            
            <div id="hud" class="hidden">
                <div class="score">점수: <span id="score-display">0</span></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
